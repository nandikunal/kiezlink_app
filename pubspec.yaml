name: kiezlink_app
description: "Kiezlink - Local Berlin news feed app"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6
  cached_network_image: ^3.3.1
  url_launcher: ^6.2.4
  http: ^1.2.1
  provider: ^6.1.1
  connectivity_plus: ^5.0.2
  shimmer: ^3.0.0
  intl: ^0.19.0
  # Session, identity & persistence
  shared_preferences: ^2.3.0
  uuid: ^4.3.3
  # Location & timezone
  geolocator: ^11.0.0
  geocoding: ^3.0.0
  flutter_timezone: ^3.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
